<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Chi Tiết Sự Kiện</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #d81b60; --bg-color: #fdf5f6; --text-main: #333; --border: #f8c4d0; }
        body { font-family: 'Be Vietnam Pro', sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 30px; }
        
        .header { background: linear-gradient(135deg, #ff9a9e, #fbc2eb); padding: 40px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .header p { margin: 10px 0 0 0; font-size: 15px; opacity: 0.9; }

        .content-box { margin: 0 20px 20px 20px; padding: 20px; border: 1px solid var(--border); border-radius: 16px; background: #fff0f5; }
        .info-row { display: flex; align-items: flex-start; margin-bottom: 15px; }
        .info-row:last-child { margin-bottom: 0; }
        .icon { font-size: 20px; margin-right: 12px; min-width: 25px; text-align: center; display: inline-block; }
        .detail strong { display: block; color: var(--main-color); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .detail span { font-size: 16px; font-weight: 500; }

        .action-group { padding: 0 20px; display: grid; gap: 12px; }
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 15px; transition: 0.2s; box-sizing: border-box; text-align: center; border: none; cursor: pointer; }
        .btn-map { background: #4CAF50; color: white; box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3); }
        .btn-call { background: #2196F3; color: white; box-shadow: 0 4px 10px rgba(33, 150, 243, 0.3); }
        .btn-calendar { background: white; color: var(--main-color); border: 2px solid var(--main-color); }
        .btn:active { transform: scale(0.98); }
        .note-section { margin: 25px 20px; text-align: center; font-size: 14px; color: #666; font-style: italic; }

        #loader { text-align: center; padding: 50px 20px; color: var(--main-color); font-weight: bold; }
        #appContent { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loader">Đang tải thông tin sự kiện... ⏳</div>

        <div id="appContent">
            <div class="header">
                <h1 id="eventTitle">Lễ Thành Hôn</h1>
                <p id="eventNames">Cô Dâu & Chú Rể</p>
            </div>

            <div class="content-box">
                <div class="info-row">
                    <div class="icon">⏰</div>
                    <div class="detail">
                        <strong>Thời gian</strong>
                        <span id="eventTime">Đang cập nhật...</span>
                    </div>
                </div>
                
                <div class="info-row">
                    <div class="icon">📍</div>
                    <div class="detail">
                        <strong>Địa điểm tổ chức</strong>
                        <span id="eventLocation">Đang cập nhật...</span>
                        <div style="font-size: 14px; color: #666; margin-top: 3px;" id="eventAddress"></div>
                    </div>
                </div>
            </div>

            <div class="action-group">
                <a href="#" id="mapLink" target="_blank" class="btn btn-map">🗺️ CHỈ ĐƯỜNG BẰNG BẢN ĐỒ</a>
                <a href="#" id="callLink" class="btn btn-call">📞 GỌI HOTLINE HỖ TRỢ ĐƯỜNG ĐI</a>
                <button onclick="downloadICS()" class="btn btn-calendar">📅 LƯU SỰ KIỆN VÀO LỊCH ĐIỆN THOẠI</button>
            </div>

            <div class="note-section">Sự hiện diện của quý khách là niềm vinh hạnh lớn nhất cho gia đình chúng tôi! ❤️</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxJWMMOscQWsCGwxdQxcrqmnmJ5wGsYle8ZFt1O6F4bEIr57h188KOi23BdkaTc9hkT/exec"; // <--- THAY LINK API VÀO ĐÂY

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const templateId = urlParams.get('id');

            if (!templateId) {
                document.getElementById('loader').innerText = "⚠️ Không tìm thấy mã sự kiện.";
                return;
            }

            fetch(API_URL + "?action=read&id=" + templateId)
                .then(res => res.json())
                .then(data => {
                    if (data.error || !data.eventDetails || data.eventDetails === "{}") {
                        document.getElementById('loader').innerText = "⚠️ Sự kiện này chưa được chủ tiệc cập nhật chi tiết!";
                        return;
                    }

                    const ev = JSON.parse(data.eventDetails);
                    document.getElementById('eventTitle').innerText = ev.title || "Sự Kiện";
                    document.getElementById('eventNames').innerText = ev.names || "Chưa cập nhật tên";
                    document.getElementById('eventTime').innerText = ev.time || "Chưa cập nhật giờ";
                    document.getElementById('eventLocation').innerText = ev.location || "Chưa cập nhật địa điểm";
                    document.getElementById('eventAddress').innerText = ev.address || "";
                    
                    if (ev.mapLink) document.getElementById('mapLink').href = ev.mapLink;
                    if (ev.phone) document.getElementById('callLink').href = "tel:" + ev.phone;

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('appContent').style.display = 'block';
                })
                .catch(err => { document.getElementById('loader').innerText = "⚠️ Mất kết nối máy chủ."; });
        };

        function downloadICS() {
            const title = document.getElementById('eventTitle').innerText + " " + document.getElementById('eventNames').innerText;
            const location = document.getElementById('eventLocation').innerText;
            
            const icsData = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDTSTART:20260502T100000\nDTEND:20260502T140000\nLOCATION:${location}\nDESCRIPTION:Rất hân hạnh được đón tiếp bạn!\nBEGIN:VALARM\nTRIGGER:-PT2H\nACTION:DISPLAY\nDESCRIPTION:Nhắc nhở sự kiện!\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`;

            const blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = 'Lich_Trinh_Su_Kien.ics';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
